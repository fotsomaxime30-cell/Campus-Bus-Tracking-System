<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusRide — Live Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --ink: #0a0e1a;
    --paper: #f7f5f0;
    --gold: #f0b429;
    --teal: #0d9488;
    --teal-light: #ccfbf1;
    --red: #ef4444;
    --green: #22c55e;
    --orange: #f97316;
    --card: #ffffff;
    --muted: #6b7280;
    --border: #e5e7eb;
    --sidebar: 340px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── TOP NAV ── */
  .topnav {
    height: 64px; background: var(--ink);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 100;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 18px; color: white; text-decoration: none;
  }
  .nav-logo-icon {
    width: 36px; height: 36px; background: var(--gold);
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 18px;
    box-shadow: 0 4px 14px rgba(240,180,41,0.4);
  }
  .nav-logo span { color: var(--gold); }
  .nav-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3);
    color: var(--green); border-radius: 20px;
    padding: 5px 12px; font-size: 12px; font-weight: 500;
  }
  .nav-badge::before {
    content: ''; width: 7px; height: 7px;
    background: var(--green); border-radius: 50%;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.5;transform:scale(1.4)}
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-time {
    font-family: 'Syne', sans-serif; color: rgba(255,255,255,0.4);
    font-size: 14px; letter-spacing: 0.5px;
  }
  .nav-logout {
    padding: 8px 18px; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: rgba(255,255,255,0.6); font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
    text-decoration: none;
  }
  .nav-logout:hover { background: rgba(255,255,255,0.12); color: white; }

  /* ── MAIN LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar); flex-shrink: 0;
    background: var(--paper);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 24px 0;
  }
  .sidebar-title {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 20px; color: var(--ink); margin-bottom: 4px;
  }
  .sidebar-sub { color: var(--muted); font-size: 13px; }

  /* Search */
  .search-wrap { padding: 16px 24px; position: relative; }
  .search-input {
    width: 100%; padding: 11px 16px 11px 40px;
    border: 2px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--ink); background: white; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--teal); }
  .search-icon {
    position: absolute; left: 36px; top: 50%; transform: translateY(-50%);
    font-size: 16px; pointer-events: none;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex; gap: 8px; padding: 0 24px 16px;
  }
  .filter-tab {
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1.5px solid var(--border); background: white;
    color: var(--muted); transition: all 0.2s;
  }
  .filter-tab.active, .filter-tab:hover {
    background: var(--ink); color: white; border-color: var(--ink);
  }

  /* Bus list */
  .bus-list {
    flex: 1; overflow-y: auto; padding: 0 16px 16px;
  }
  .bus-list::-webkit-scrollbar { width: 4px; }
  .bus-list::-webkit-scrollbar-track { background: transparent; }
  .bus-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .bus-card {
    background: white; border-radius: 14px; padding: 16px 18px;
    margin-bottom: 10px; cursor: pointer; transition: all 0.2s ease;
    border: 2px solid transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    animation: cardIn 0.4s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bus-card:hover { border-color: var(--teal); transform: translateX(4px); }
  .bus-card.selected { border-color: var(--teal); background: var(--teal-light); }

  .bc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .bc-id {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 16px; color: var(--ink);
  }
  .bc-status {
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .status-on-route { background: #dcfce7; color: #15803d; }
  .status-idle     { background: #fef9c3; color: #a16207; }
  .status-full     { background: #fee2e2; color: #b91c1c; }
  .status-incident { background: #fee2e2; color: #b91c1c; }

  .bc-meta { display: flex; gap: 16px; }
  .bc-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .bc-meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  .bc-meta-val { font-size: 14px; font-weight: 500; color: var(--ink); }

  .occ-bar {
    height: 4px; background: var(--border);
    border-radius: 4px; margin-top: 12px; overflow: hidden;
  }
  .occ-fill {
    height: 100%; border-radius: 4px; transition: width 0.5s ease;
    background: linear-gradient(90deg, var(--teal), var(--gold));
  }

  /* No buses placeholder */
  .no-buses {
    text-align: center; padding: 50px 20px; color: var(--muted);
  }
  .no-buses-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── MAP AREA ── */
  .map-area {
    flex: 1; position: relative; overflow: hidden;
  }
  #map { width: 100%; height: 100%; }

  /* Map overlay info panel */
  .map-overlay {
    position: absolute; top: 20px; right: 20px; z-index: 500;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(16px);
    border-radius: 16px; padding: 20px;
    color: white; min-width: 220px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .mo-title {
    font-family: 'Syne', sans-serif; font-size: 13px;
    color: rgba(255,255,255,0.4); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 14px;
  }
  .mo-stat { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .mo-stat-label { font-size: 13px; color: rgba(255,255,255,0.5); }
  .mo-stat-val { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: white; }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: white; padding: 14px 24px;
    border-radius: 12px; font-size: 14px; z-index: 1000;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    display: flex; align-items: center; gap: 10px; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Leaflet custom marker */
  .bus-marker {
    background: var(--ink); color: white;
    border: 3px solid var(--gold); border-radius: 12px;
    padding: 4px 10px; font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .bus-marker.incident { border-color: var(--red); }
  .bus-marker.idle { border-color: var(--muted); }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">🚌</div>
    Campus<span>Ride</span>
  </a>
  <div class="nav-badge">Live Tracking Active</div>
  <div class="nav-right">
    <div class="nav-time" id="navTime">--:--</div>
    <a href="index.html" class="nav-logout">Sign Out</a>
  </div>
</nav>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Bus Fleet</div>
      <div class="sidebar-sub">Tap a bus to focus on map</div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search bus ID or route…" oninput="filterBuses()"/>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('On Route', this)">On Route</button>
      <button class="filter-tab" onclick="setFilter('Idle', this)">Idle</button>
      <button class="filter-tab" onclick="setFilter('incident', this)">Incident</button>
    </div>

    <div class="bus-list" id="busList">
      <div class="no-buses">
        <div class="no-buses-icon">🔄</div>
        <div>Connecting to server…</div>
      </div>
    </div>
  </aside>

  <!-- MAP -->
  <div class="map-area">
    <div id="map"></div>

    <div class="map-overlay">
      <div class="mo-title">Fleet Summary</div>
      <div class="mo-stat">
        <span class="mo-stat-label">🟢 On Route</span>
        <span class="mo-stat-val" id="countOnRoute">–</span>
      </div>
      <div class="mo-stat">
        <span class="mo-stat-label">🟡 Idle</span>
        <span class="mo-stat-val" id="countIdle">–</span>
      </div>
      <div class="mo-stat">
        <span class="mo-stat-label">🔴 Incident</span>
        <span class="mo-stat-val" id="countIncident">–</span>
      </div>
      <div class="mo-stat" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
        <span class="mo-stat-label">Total Passengers</span>
        <span class="mo-stat-val" id="totalPassengers">–</span>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">🚌 <span id="toastMsg"></span></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  // ── MAP SETUP ──
  // Center map on Yaoundé, Cameroon (ICT University area) with detailed stop markers
  const map = L.map('map', { zoomControl: false }).setView([3.8676, 11.5181], 15);
  
  // Add detailed stop markers for all 6 Yaoundé stops
  const yaoundeStopts = [
    { name: 'Carrefour Vogt', lat: 3.8482, lng: 11.5032, color: '#0d9488', icon: '🏢', desc: 'Main departure/terminus' },
    { name: 'Olezoa', lat: 3.8558, lng: 11.5058, color: '#0d9488', icon: '🏘️', desc: 'Neighbourhood pick-up' },
    { name: 'Post Central', lat: 3.8645, lng: 11.5160, color: '#0d9488', icon: '📬', desc: 'Central Post Office area' },
    { name: 'Nlongkak', lat: 3.8710, lng: 11.5125, color: '#0d9488', icon: '🏪', desc: 'Neighbourhood' },
    { name: 'Carrefour du Palais', lat: 3.8778, lng: 11.5190, color: '#f59e0b', icon: '🏛️', desc: 'Near Presidential Palace' },
    { name: 'Dispensaire Messassi', lat: 3.8872, lng: 11.5305, color: '#10b981', icon: '🏫', desc: 'ICT University Campus' }
  ];
  
  // Add stop markers with popups
  yaoundeStopts.forEach((s, i) => {
    const stopIcon = L.divIcon({
      html: `<div style="width:52px;height:52px;background:${s.color};border:4px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 20px ${s.color}99;font-weight:700;cursor:pointer">${s.icon}</div>`,
      className: '',
      iconSize: [52, 52],
      iconAnchor: [26, 26]
    });
    const marker = L.marker([s.lat, s.lng], { icon: stopIcon }).addTo(map)
      .bindPopup(`<div style="font-family:Outfit,sans-serif;min-width:180px"><div style="font-weight:700;font-size:15px;color:#e2e8f0;margin-bottom:4px">${s.name}</div><div style="font-size:12px;color:#94a3b8;margin-bottom:6px">${s.desc}</div><div style="font-size:10px;color:${s.color};font-weight:700">📍 Stop ${i+1} of 6</div><div style="font-size:9px;color:#64748b;margin-top:4px">Lat: ${s.lat.toFixed(4)}, Lng: ${s.lng.toFixed(4)}</div></div>`);
  });
  
  // Draw morning route polyline
  const morningRoute = [[3.8482, 11.5032], [3.8558, 11.5058], [3.8645, 11.5160], [3.8710, 11.5125], [3.8778, 11.5190], [3.8872, 11.5305]];
  L.polyline(morningRoute, { color: '#3b82f6', weight: 3, opacity: 0.7, dashArray: '5,5' }).addTo(map).bindPopup('Morning Route: 7:00 - 8:30');
  
  // Draw evening route polyline (reversed)
  const eveningRoute = [[3.8872, 11.5305], [3.8778, 11.5190], [3.8710, 11.5125], [3.8645, 11.5160], [3.8558, 11.5058], [3.8482, 11.5032]];
  L.polyline(eveningRoute, { color: '#8b5cf6', weight: 3, opacity: 0.5, dashArray: '8,3' }).addTo(map).bindPopup('Evening Route: 17:30 - 19:00');
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  // Use Mapbox-style detailed streets map showing neighborhoods and street names
  L.tileLayer('https://tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors | Street map with neighborhood labels', maxZoom: 19, minZoom: 2
  }).addTo(map);
  
  // Add layer control to switch between map styles
  const streets = L.tileLayer('https://tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png', {
    attribution: '© OSM Street Map', maxZoom: 19, className: 'street-map'
  });
  const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri Satellite', maxZoom: 18, className: 'satellite-map'
  });
  const hybrid = L.tileLayer('https://tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png', {
    attribution: '© OSM Hybrid', maxZoom: 19
  });
  const baseMaps = { 'Streets (Detailed)': streets, 'Satellite': satellite, 'Hybrid': hybrid };
  L.control.layers(baseMaps, {}, { position: 'topright', collapsed: true }).addTo(map);

  // ── STATE ──
  let buses = {};
  let markers = {};
  let selectedBus = null;
  let filterStatus = 'all';

  // ── SOCKET ──
  let socket;
  try {
    socket = io();
    socket.on('initialBuses', (list) => list.forEach(normAndUpdate));
    socket.on('busMoved', normAndUpdate);
    socket.on('statusUpdate', normAndUpdate);
    socket.on('busUpdate', normAndUpdate);
  } catch(e) {
    // No server — use demo data
    loadDemoData();
  }

  // Fallback HTTP fetch
  fetch('/api/buses').then(r => r.json()).then(data => data.forEach(normAndUpdate)).catch(loadDemoData);

  function loadDemoData() {
    const demo = [
      { id:'BUS-01', lat:3.8482, lng:11.5032, occupancy:12, status:'On Route' },
      { id:'BUS-02', lat:3.8558, lng:11.5058, occupancy:3,  status:'Idle' },
      { id:'BUS-03', lat:3.8645, lng:11.5160, occupancy:28, status:'Full' },
      { id:'BUS-04', lat:3.8872, lng:11.5305, occupancy:0,  status:'Incident/Delay' },
    ];
    demo.forEach(normAndUpdate);
    // Simulate movement
    setInterval(() => {
      demo.forEach(b => {
        b.lat += (Math.random()-0.5)*0.0005;
        b.lng += (Math.random()-0.5)*0.0005;
        normAndUpdate(b);
      });
    }, 3000);
  }

  function normAndUpdate(raw) {
    const b = {
      id: raw.id || raw.busId,
      lat: raw.lat, lng: raw.lng,
      status: raw.status || 'Unknown',
      occupancy: raw.occupancy != null ? raw.occupancy : 0
    };
    if (!b.id || b.lat == null) return;
    const prev = buses[b.id];
    buses[b.id] = { ...prev, ...b };
    updateMarker(buses[b.id]);
    renderSidebar();
    updateOverlay();
    if (prev && prev.status !== b.status) showToast(`${b.id} status → ${b.status}`);
  }

  // ── MARKERS ──
  function makeIcon(bus) {
    const s = (bus.status || '').toLowerCase();
    const cls = s.includes('incident') ? 'incident' : s === 'idle' ? 'idle' : '';
    return L.divIcon({
      html: `<div class="bus-marker ${cls}">🚌 ${bus.id}</div>`,
      iconAnchor: [35, 15], className: ''
    });
  }

  function updateMarker(bus) {
    if (!bus.lat || !bus.lng) return;
    if (!markers[bus.id]) {
      markers[bus.id] = L.marker([bus.lat, bus.lng], { icon: makeIcon(bus) })
        .addTo(map)
        .bindPopup(() => makePopupHtml(bus));
    } else {
      markers[bus.id].setLatLng([bus.lat, bus.lng]);
      markers[bus.id].setIcon(makeIcon(bus));
    }
  }

  function makePopupHtml(bus) {
    const pct = Math.min(100, Math.round((bus.occupancy / 35) * 100));
    return `
      <div style="font-family:'DM Sans',sans-serif;min-width:160px">
        <b style="font-family:'Syne',sans-serif;font-size:15px">${bus.id}</b><br>
        <span style="color:#6b7280;font-size:13px">Status: ${bus.status}</span><br>
        <span style="color:#6b7280;font-size:13px">Occupancy: ${bus.occupancy}</span>
        <div style="height:4px;background:#e5e7eb;border-radius:4px;margin-top:8px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#0d9488,#f0b429);border-radius:4px"></div>
        </div>
      </div>`;
  }

  // ── SIDEBAR ──
  function renderSidebar() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const list = Object.values(buses)
      .filter(b => {
        const matchQ = !q || b.id.toLowerCase().includes(q);
        const matchF = filterStatus === 'all' ||
          (filterStatus === 'incident' ? (b.status||'').toLowerCase().includes('incident') :
           (b.status||'').toLowerCase() === filterStatus.toLowerCase());
        return matchQ && matchF;
      });

    const container = document.getElementById('busList');
    if (!list.length) {
      container.innerHTML = `<div class="no-buses"><div class="no-buses-icon">🚌</div><div>No buses match filter</div></div>`;
      return;
    }

    container.innerHTML = list.map((b, i) => {
      const pct = Math.min(100, Math.round((b.occupancy / 35) * 100));
      const statusCls = (b.status||'').includes('Incident') ? 'status-incident' :
                        (b.status||'') === 'Idle' ? 'status-idle' :
                        (b.status||'') === 'Full' ? 'status-full' : 'status-on-route';
      const sel = selectedBus === b.id ? 'selected' : '';
      return `
        <div class="bus-card ${sel}" style="animation-delay:${i*0.05}s" onclick="focusBus('${b.id}')">
          <div class="bc-top">
            <span class="bc-id">🚌 ${b.id}</span>
            <span class="bc-status ${statusCls}">${b.status || 'Unknown'}</span>
          </div>
          <div class="bc-meta">
            <div class="bc-meta-item">
              <span class="bc-meta-label">Passengers</span>
              <span class="bc-meta-val">${b.occupancy}</span>
            </div>
            <div class="bc-meta-item">
              <span class="bc-meta-label">Capacity</span>
              <span class="bc-meta-val">${pct}%</span>
            </div>
            <div class="bc-meta-item">
              <span class="bc-meta-label">Lat</span>
              <span class="bc-meta-val">${(b.lat||0).toFixed(3)}</span>
            </div>
          </div>
          <div class="occ-bar"><div class="occ-fill" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }

  function focusBus(id) {
    selectedBus = id;
    const b = buses[id];
    if (b && b.lat) {
      map.flyTo([b.lat, b.lng], 17, { duration: 1 });
      if (markers[id]) markers[id].openPopup();
    }
    renderSidebar();
  }

  function filterBuses() { renderSidebar(); }
  function setFilter(f, el) {
    filterStatus = f;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderSidebar();
  }

  // ── OVERLAY ──
  function updateOverlay() {
    const list = Object.values(buses);
    const onRoute = list.filter(b => (b.status||'').toLowerCase().includes('route')).length;
    const idle    = list.filter(b => (b.status||'').toLowerCase() === 'idle').length;
    const inc     = list.filter(b => (b.status||'').toLowerCase().includes('incident')).length;
    const total   = list.reduce((s, b) => s + (b.occupancy||0), 0);
    document.getElementById('countOnRoute').textContent = onRoute;
    document.getElementById('countIdle').textContent = idle;
    document.getElementById('countIncident').textContent = inc;
    document.getElementById('totalPassengers').textContent = total;
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── CLOCK ──
  function updateClock() {
    document.getElementById('navTime').textContent =
      new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);
</script>
</body>
</html>
